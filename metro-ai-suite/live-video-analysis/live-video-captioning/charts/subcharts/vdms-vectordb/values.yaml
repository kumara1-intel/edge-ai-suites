#
# vdms-vectordb/values.yaml - default values for the VDMS Vector DB subchart.

# Override the generated fullname. Set to "vdms-vector-db" in parent values.yaml
# so that other subcharts can reliably reference the service by this name.
# Type: string
fullnameOverride: ""

global:
  # Set this value to hostPath where we want to mount a volume (Used in single node cluster or standalone sub-chart installation).
  volumeHostPath: ""

  # usePvc should be set to true to use a PVC for persisting models, cache and other files.
  usePvc: false

  # keepPvc should be set to true to retain the PVC after uninstalling the chart.
  keepPvc: false

replicaCount: 1

image:
  # Type: string
  repository: intellabs/vdms
  # Type: string - pinned for reproducibility
  tag: "v2.11.0"
  # Type: string  [Always | IfNotPresent | Never]
  pullPolicy: IfNotPresent

service:
  # Type: string  [ClusterIP | NodePort | LoadBalancer]
  type: ClusterIP
  # VDMS listener port.
  # Type: integer
  port: 55555   # Port on which service listens for incoming connection, if exposed externally
  portName: http
  containerPort: 55555 # Port on which container application listens internally
  containerPortName: vdms-db-port

resources: {}

livenessProbe:
  tcpSocket:
    port: vdms-db-port
  periodSeconds: 20
  failureThreshold: 10
readinessProbe:
  tcpSocket:
    port: vdms-db-port
  periodSeconds: 10
  failureThreshold: 6
startupProbe:
  tcpSocket:
    port: vdms-db-port
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 10

volumes: []
volumeMounts: []

podSecurityContext: {}
securityContext: {}

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "2Gi"

podAnnotations: {}
podLabels: {}

nodeSelector: {}

tolerations: []

affinity: {}
