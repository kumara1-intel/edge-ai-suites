apiVersion: v1
kind: Service
metadata:
  name: {{ include "live-video-captioning-rag.fullname" . }}
  labels:
    {{- include "live-video-captioning-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: live-video-captioning-rag
spec:
  type: ClusterIP
  selector:
    {{- include "live-video-captioning-rag.selectorLabels" . | nindent 4 }}
  ports:
    - name: rag-dashboard
      port: {{ .Values.service.port }}
      targetPort: rag-dashboard
      protocol: TCP
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
