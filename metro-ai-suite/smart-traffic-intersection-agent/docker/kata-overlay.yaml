# Kata Containers overlay - included automatically when deploying with --secure-setup flag.
# Adds Kata VM runtime, DNS relay, and resolv.conf mounts for dlstreamer and vlm services.

services:
  dlstreamer-pipeline-server:
    runtime: io.containerd.kata.v2
    privileged: false
    volumes:
      - dlstreamer-pipeline-server-pipeline-root:/var/cache/pipeline_root
      - ./kata-resolv.conf:/etc/resolv.conf:ro
    deploy:
      resources:
        limits:
          cpus: '4'
        reservations:
          cpus: '2'

  vlm-openvino-serving:
    runtime: io.containerd.kata.v2
    healthcheck:
      start_period: 300s
    volumes:
      - ./kata-resolv.conf:/etc/resolv.conf:ro
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 12G
        reservations:
          cpus: '2'
          memory: 8G

  kata-dns-relay:
    image: coredns/coredns:1.14.2
    networks:
      scenescape:
        ipv4_address: 172.20.0.200
    configs:
      - source: corefile
        target: /Corefile
    command: -conf /Corefile
    restart: on-failure:5

volumes:
  dlstreamer-pipeline-server-pipeline-root:
    driver_opts:
      o: uid=1999,gid=1999

networks:
  scenescape:
    ipam:
      config:
        - subnet: 172.20.0.0/16

configs:
  corefile:
    content: |
      . {
          forward . 127.0.0.11
          errors
          #log
      }
