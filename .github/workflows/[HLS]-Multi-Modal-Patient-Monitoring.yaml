name: "[HLS - Multi Modal Patient Monitoring] SDLe Scans"
run-name: "[HLS - Multi Modal Patient Monitoring] PR workflow (by @${{ github.actor }} via ${{ github.event_name }})"


# Only run at most 1 workflow concurrently per PR, unlimited for branches
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
    branches:
      - main
    paths:
      - 'health-and-life-sciences-ai-suite/multi_modal_patient_monitoring/**'

jobs:   
  trivy-scan:
    runs-on: ubuntu-22.04-32core-128GB
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@8edcb1bdb4e267140fa742c62e395cd74f332709
        with:
          persist-credentials: false
      - name: Run Trivy Filesystem Scan
        uses: open-edge-platform/orch-ci/.github/actions/security/trivy@27276444a9bcf247a27369406686b689933bd1ff
        id: trivy-fs
        with:
          scan_type: "fs"  
          scan-scope: "all"  
          severity: "HIGH,CRITICAL" 
          format: "json"
          scan_target: "health-and-life-sciences-ai-suite/multi_modal_patient_monitoring/"
          report_suffix: "-CT7"

      - name: Run Trivy Filesystem Scan (SPDX)
        uses: open-edge-platform/orch-ci/.github/actions/security/trivy@27276444a9bcf247a27369406686b689933bd1ff
        id: trivy-fs-spdx
        with:
          scan_type: "fs"  
          scan-scope: "all"  
          severity: "HIGH,CRITICAL" 
          format: "spdx-json"
          scan_target: "health-and-life-sciences-ai-suite/multi_modal_patient_monitoring/"
          report_suffix: "-CT7-spdx"
      
      - name: Build Docker image - 3d-pose-estimation
        run: |
          cd health-and-life-sciences-ai-suite/multi_modal_patient_monitoring/services/3d-pose-estimation/
          docker build -t multi-modal-3d-pose-estimation:latest -f Dockerfile .

      - name: Build Docker image - ai-ecg-backend
        run: |
          cd health-and-life-sciences-ai-suite/multi_modal_patient_monitoring/services/ai-ecg/backend/
          docker build -t multi-modal-ai-ecg-backend:latest -f Dockerfile .

      - name: Build Docker image - dds-bridge
        run: |
          cd health-and-life-sciences-ai-suite/multi_modal_patient_monitoring/services/dds-bridge/
          docker build -t multi-modal-dds-bridge:latest -f Dockerfile .

      - name: Build Docker image - mdpnp
        run: |
          cd health-and-life-sciences-ai-suite/multi_modal_patient_monitoring/services/mdpnp/
          docker build -t multi-modal-mdpnp:latest -f Dockerfile .

      - name: Build Docker image - metrics-collector
